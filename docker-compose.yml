services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nanu
      POSTGRES_PASSWORD: nanu_password
      POSTGRES_DB: nanu
    ports:
      - "5432:5432"
    volumes:
      - nanu_pg:/var/lib/postgresql/data

  api:
    build: ./backend

    volumes:
      - ./models:/models

    env_file:
      - ./.env

    depends_on:
      - db

    ports:
      - "8000:8000"

volumes:
  nanu_pg: